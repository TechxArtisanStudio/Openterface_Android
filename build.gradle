// Top-level build file where you can add configuration options common to all sub-projects/modules.
buildscript {
    repositories {
		// Use standard repositories first
		google()
		mavenCentral()
		// Aliyun mirrors as fallback
		maven { url 'https://maven.aliyun.com/repository/google' }
		maven { url 'https://maven.aliyun.com/repository/central' }
    }
    dependencies {
        // AGP 8.5.2 supports SDK 35, works with Gradle 8.7, requires Java 17+
        // Built-in 16KB page alignment support for Android 15+
        classpath 'com.android.tools.build:gradle:8.5.2'
    }
}

allprojects {
    apply plugin: 'signing'

    repositories {
		// Standard repositories first
		google()
		mavenCentral()

		maven { url 'https://jitpack.io' }
		maven { url 'https://maven.getstream.io/artifactory/maven/' }

		// Aliyun mirrors as fallback
		maven { url 'https://maven.aliyun.com/repository/google' }
		maven { url 'https://maven.aliyun.com/repository/central' }
    }
}

ext {
	versionCompiler = 35
	versionTarget = 35
	versionMin = 21

	javaSourceCompatibility = JavaVersion.VERSION_1_8
	javaTargetCompatibility = JavaVersion.VERSION_1_8
}