name: Create GitHub Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: 'patch'
      release_type:
        description: 'Release Type'
        required: true
        type: choice
        options:
          - pre-release
          - release
        default: 'release'

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: recursive
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Initialize submodules
      run: |
        git submodule update --init --recursive
        ls -la app/src/main/jni/Openterface_Core/ || echo "No Openterface_Core submodule"

    # ======== STEP 1: Bump Version ========
    - name: Bump Version
      id: bump
      run: |
        # Read current version
        CURRENT_VERSION=$(grep "versionName" app/build.gradle | awk '{print $2}' | tr -d '"')
        CURRENT_CODE=$(grep "versionCode" app/build.gradle | awk '{print $2}')

        echo "📦 Current version: $CURRENT_VERSION (code: $CURRENT_CODE)"

        # Parse version (e.g., 1.2.0 -> major=1, minor=2, patch=0)
        IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"

        # Bump version based on input
        BUMP_TYPE="${{ github.event.inputs.bump_type }}"
        echo "🔼 Bump type: $BUMP_TYPE"

        case "$BUMP_TYPE" in
          major)
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
            ;;
          minor)
            MINOR=$((MINOR + 1))
            PATCH=0
            ;;
          patch)
            PATCH=$((PATCH + 1))
            ;;
        esac

        NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
        NEW_CODE=$((CURRENT_CODE + 1))

        echo "✨ New version: $NEW_VERSION (code: $NEW_CODE)"

        # Update build.gradle
        sed -i "s/versionCode $CURRENT_CODE/versionCode $NEW_CODE/" app/build.gradle
        sed -i "s/versionName \"$CURRENT_VERSION\"/versionName \"$NEW_VERSION\"/" app/build.gradle

        # Verify changes
        grep -A 2 "versionCode" app/build.gradle | head -3

        # Set outputs
        echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
        echo "new_code=$NEW_CODE" >> $GITHUB_OUTPUT
        echo "tag_name=v${NEW_VERSION}" >> $GITHUB_OUTPUT

    - name: Commit Version Bump
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add app/build.gradle
        git commit -m "Bump version to ${{ steps.bump.outputs.new_version }} (code: ${{ steps.bump.outputs.new_code }})"
        git push

    # ======== STEP 2: Set up Build Environment ========
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Build WebUI WebRTC client
      continue-on-error: true
      run: |
        if [ -d "Openterface_WebUI" ]; then
          cd Openterface_WebUI
          npm ci
          npm run build:webrtc:android
          cd ..
        else
          echo "⚠️  Openterface_WebUI not found, skipping WebRTC build"
        fi

    - name: Copy WebRTC assets to app
      continue-on-error: true
      run: |
        if [ -d "Openterface_WebUI/packages/webrtc/dist/webrtc-android" ]; then
          rm -rf app/src/main/assets/webrtc
          mkdir -p app/src/main/assets/webrtc
          cp -r Openterface_WebUI/packages/webrtc/dist/webrtc-android/* app/src/main/assets/webrtc/
          echo "✅ WebRTC assets copied"
        else
          echo "⚠️  WebRTC dist not found, skipping"
        fi

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r23b
        local-cache: true

    - name: Set up CMake
      uses: jwlawson/actions-setup-cmake@v2
      with:
        cmake-version: '3.22.1'

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        cache-read-only: false

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Create local.properties
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties

    - name: Decode Keystore
      env:
        ENCODED_STRING: ${{ secrets.SIGNING_KEY }}
      run: |
        if [ -n "$ENCODED_STRING" ]; then
          echo "$ENCODED_STRING" | base64 -d > app/keystore.jks
          echo "✅ Keystore file created: app/keystore.jks"
        else
          echo "⚠️  No SIGNING_KEY secret found, will use debug signing"
        fi

    # ======== STEP 3: Build ========
    - name: Clean and Build Release APK
      run: ./gradlew clean assembleRelease -x lint --info
      env:
        SIGNING_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
        SIGNING_KEY_ALIAS: ${{ secrets.ALIAS }}
        SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      continue-on-error: true

    - name: Build Release AAB
      run: ./gradlew bundleRelease -x lint --info
      continue-on-error: true
      env:
        SIGNING_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
        SIGNING_KEY_ALIAS: ${{ secrets.ALIAS }}
        SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    # ======== STEP 4: Rename Artifacts ========
    - name: Rename Release Files
      run: |
        # Rename APK
        if [ -d "app/build/outputs/apk/release" ]; then
          cd app/build/outputs/apk/release
          for file in *.apk; do
            if [ -f "$file" ]; then
              mv "$file" "Openterface-v${{ steps.bump.outputs.new_version }}-release.apk"
              echo "✅ Renamed APK: Openterface-v${{ steps.bump.outputs.new_version }}-release.apk"
            fi
          done
          cd ../../../../..
        fi

        # Rename AAB
        if [ -d "app/build/outputs/bundle/release" ]; then
          cd app/build/outputs/bundle/release
          for file in *.aab; do
            if [ -f "$file" ]; then
              mv "$file" "Openterface-v${{ steps.bump.outputs.new_version }}-release.aab"
              echo "✅ Renamed AAB: Openterface-v${{ steps.bump.outputs.new_version }}-release.aab"
            fi
          done
          cd ../../../../..
        fi

    # ======== STEP 5: Upload Artifacts ========
    - name: Upload Signed Release APK
      uses: actions/upload-artifact@v4
      with:
        name: Openterface-v${{ steps.bump.outputs.new_version }}-APK
        path: app/build/outputs/apk/release/*.apk
        retention-days: 90

    - name: Upload Signed Release AAB
      uses: actions/upload-artifact@v4
      if: hashFiles('app/build/outputs/bundle/release/*.aab') != ''
      with:
        name: Openterface-v${{ steps.bump.outputs.new_version }}-AAB
        path: app/build/outputs/bundle/release/*.aab
        retention-days: 90

    # ======== STEP 6: Create Git Tag ========
    - name: Create Git Tag
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        TAG_NAME="${{ steps.bump.outputs.tag_name }}"

        # Check if tag already exists
        if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
          echo "⚠️  Tag $TAG_NAME already exists, overwriting..."
          git tag -d "$TAG_NAME"
          git push origin ":refs/tags/$TAG_NAME" || true
        fi

        git tag -a "$TAG_NAME" -m "Release $TAG_NAME"
        git push origin "$TAG_NAME"
        echo "✅ Created and pushed tag: $TAG_NAME"

    # ======== STEP 7: Generate Release Notes ========
    - name: Generate Release Notes
      id: release_notes
      run: |
        RELEASE_DATE=$(date '+%Y-%m-%d')
        RELEASE_TYPE="${{ inputs.release_type }}"
        cat > release_notes.md << EOF
        ## Openterface Android ${{ steps.bump.outputs.tag_name }}

        ### 📱 Application Information
        - **Version**: ${{ steps.bump.outputs.new_version }}
        - **Version Code**: ${{ steps.bump.outputs.new_code }}
        - **Release Date**: ${RELEASE_DATE}
        - **Release Type**: ${RELEASE_TYPE}

        ### 📦 Downloads
        This release includes:
        - **APK**: For direct installation on Android devices
        - **AAB**: For Google Play Store submission (if available)

        ### ✨ Features
        - Support for 16 KB page size (Android 15+ compatible)
        - Target SDK: Android 15 (API 35)
        - Minimum SDK: Android 5.0 (API 21)

        ### 📥 Installation
        **APK Installation:**
        1. Download the APK file below
        2. Enable 'Install from Unknown Sources' in Android settings
        3. Open the APK file to install

        **Google Play:**
        Upload the AAB file to Google Play Console for distribution.

        ### 🔐 Security
        Both APK and AAB files are signed with the official release keystore.

        ---
        **Full Changelog**: https://github.com/${{ github.repository }}/commits/${{ steps.bump.outputs.tag_name }}
        EOF

        echo "notes_file=release_notes.md" >> $GITHUB_OUTPUT

    # ======== STEP 8: Create GitHub Release ========
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.bump.outputs.tag_name }}
        name: Openterface Android v${{ steps.bump.outputs.new_version }}
        body_path: release_notes.md
        draft: false
        prerelease: ${{ github.event.inputs.release_type == 'pre-release' }}
        files: |
          ./app/build/outputs/apk/release/*.apk
          ./app/build/outputs/bundle/release/*.aab
        fail_on_unmatched_files: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # ======== STEP 9: Release Summary ========
    - name: Release Summary
      run: |
        echo "## 🎉 Release Created Successfully!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📋 Release Information" >> $GITHUB_STEP_SUMMARY
        echo "- **Tag**: ${{ steps.bump.outputs.tag_name }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Version**: ${{ steps.bump.outputs.new_version }} (code: ${{ steps.bump.outputs.new_code }})" >> $GITHUB_STEP_SUMMARY
        echo "- **Type**: ${{ inputs.release_type }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Bump**: ${{ inputs.bump_type }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 🔗 Links" >> $GITHUB_STEP_SUMMARY
        echo "- [View Release](https://github.com/${{ github.repository }}/releases/tag/${{ steps.bump.outputs.tag_name }})" >> $GITHUB_STEP_SUMMARY
        echo "- [All Releases](https://github.com/${{ github.repository }}/releases)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📦 Artifacts Included" >> $GITHUB_STEP_SUMMARY
        if [ -d "app/build/outputs/apk/release" ] && [ -n "$(ls -A app/build/outputs/apk/release)" ]; then
          echo "- ✅ APK files" >> $GITHUB_STEP_SUMMARY
        else
          echo "- ⚠️  No APK files found" >> $GITHUB_STEP_SUMMARY
        fi
        if [ -d "app/build/outputs/bundle/release" ] && [ -n "$(ls -A app/build/outputs/bundle/release)" ]; then
          echo "- ✅ AAB files" >> $GITHUB_STEP_SUMMARY
        else
          echo "- ⚠️  No AAB files found" >> $GITHUB_STEP_SUMMARY
        fi
